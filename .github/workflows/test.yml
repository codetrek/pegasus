name: Test

on:
  workflow_call:
    inputs:
      coverage-threshold:
        description: 'Minimum line coverage percentage required'
        required: false
        type: number
        default: 0
    outputs:
      coverage:
        description: 'Test coverage percentage'
        value: ${{ jobs.test.outputs.coverage }}

jobs:
  # ── Typecheck (parallel with test) ──────────────────────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run typecheck
        run: bun run typecheck

  # ── Test + Coverage (parallel with typecheck) ───────────
  test:
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium --with-deps

      # Cache the apt package list for Playwright system deps.
      # install-deps runs apt-get update + install every time (~17s).
      # By caching /var/cache/apt and the dpkg state, subsequent runs
      # skip the network fetch and just verify packages are installed.
      - name: Cache Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        id: playwright-deps-cache
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/dpkg
          key: playwright-deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-deps-${{ runner.os }}-

      - name: Install Playwright system deps (cached browser)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Run tests with coverage
        id: coverage
        run: |
          OUTPUT=$(PEGASUS_LOG_LEVEL=silent bun test --coverage --coverage-reporter=text --coverage-reporter=lcov tests/ 2>&1 | tee /dev/stderr)
          COVERAGE=$(echo "$OUTPUT" | grep "All files" | awk '{print $4}' | tr -d '%')
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Line Coverage: $COVERAGE%"

      - name: Check coverage threshold
        if: ${{ inputs.coverage-threshold > 0 }}
        run: |
          COVERAGE=${{ steps.coverage.outputs.percentage }}
          THRESHOLD=${{ inputs.coverage-threshold }}

          echo "Coverage: $COVERAGE%"
          echo "Threshold: $THRESHOLD%"

          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below threshold $THRESHOLD%"
            exit 1
          else
            echo "✅ Coverage $COVERAGE% meets threshold $THRESHOLD%"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore
